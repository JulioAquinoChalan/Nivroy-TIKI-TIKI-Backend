services:
  - type: web
    name: nivroy-tiki-tiki-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: FIREBASE_EMAIL_VERIFICATION_CONTINUE_URL
        sync: false
      - key: TIKTOK_USERNAME
        sync: false
